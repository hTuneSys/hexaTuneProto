name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt
        run: cargo fmt --all -- --check

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  no-std-check:
    name: no_std Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - uses: Swatinem/rust-cache@v2

      - name: Check proto (no_std)
        run: cargo check -p hexa-tune-proto --target thumbv6m-none-eabi --no-default-features

      - name: Check proto-embedded (no_std)
        run: cargo check -p hexa-tune-proto-embedded --target thumbv6m-none-eabi --no-default-features
